services:
  headscale:
    image: docker.io/headscale/headscale:0.25.1-debug
    container_name: pfsense-headscale
    hostname: headscale
    entrypoint: ["/busybox/sh", "-c"]
    command:
      - |
        mkdir -p /var/lib/headscale /etc/headscale
        cp /mnt/config.yaml /etc/headscale/config.yaml
        exec /ko-app/headscale serve
    volumes:
      - ./headscale/config.yaml:/mnt/config.yaml:ro
    ports:
      - "8080:8080"
      - "50443:50443"
    networks:
      pfsense-wan:
        ipv4_address: $PFSENSE_IPV4
    healthcheck:
      test: ["CMD-SHELL", "/busybox/wget -q --spider http://127.0.0.1:8080/health || exit 1"]
      interval: 3s
      timeout: 3s
      retries: 20
      start_period: 5s

  pfsense-mock:
    build: ./pfsense
    container_name: pfsense-mock
    hostname: pfsense-mock
    cap_add:
      - NET_ADMIN
      - NET_RAW
    sysctls:
      - net.ipv4.ip_forward=1
    ports:
      - "2222:22"
      - "8880:8880"
    networks:
      pfsense-lan:
        ipv4_address: $PFSENSE_LAN_IPV4
      pfsense-wan:
        ipv4_address: $PFSENSE_WAN_IPV4
    depends_on:
      headscale:
        condition: service_healthy
    environment:
      ADMIN_USER: admin
      ADMIN_PASS: pfsense
      HEADSCALE_URL: "http://$PFSENSE_IPV4:$PFSENSE_PORT"
      WAN_IP: "$PFSENSE_WAN_IPV4"
      LAN_IP: "$PFSENSE_LAN_IPV4"
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import socket; s=socket.socket(); s.settimeout(1); s.connect(('127.0.0.1',22)); s.close()\""]
      interval: 2s
      timeout: 3s
      retries: 15
      start_period: 3s

  internal-server:
    build: ./internal-server
    container_name: pfsense-internal
    hostname: internal-server
    networks:
      pfsense-lan:
        ipv4_address: 10.99.1.10

  wan-client:
    build: ./internal-server
    container_name: pfsense-wan-client
    hostname: wan-client
    networks:
      pfsense-wan:
        ipv4_address: 10.99.2.161

  wg-client:
    build: ./wg-client
    container_name: pfsense-wg-client
    hostname: wg-client
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    sysctls:
      - net.ipv4.ip_forward=1
    ports:
      - "2223:22"
    networks:
      pfsense-wan:
        ipv4_address: 10.99.2.200
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 22 2>/dev/null && echo ok"]
      interval: 2s
      timeout: 3s
      retries: 15
      start_period: 3s

networks:
  pfsense-lan:
    driver: bridge
    ipam:
      config:
        - subnet: 10.99.1.0/24
  pfsense-wan:
    driver: bridge
    ipam:
      config:
        - subnet: 10.99.2.0/24
