---
# Minimal Phase G SDL for local Akash dev cluster testing.
# Uses the real minio-ipfs image (needs actual S3 + IPFS services).
# Exposes raw NodePorts (no accept: domains — local dev has no ingress).
# NGINX_ENABLED=false skips the nginx proxy layer; tests hit services directly.
# No signedBy / attributes constraints — local dev provider has none.
version: "2.0"
services:
  ${IPFS_SVC}:
    image: ${MINIO_IPFS_IMAGE}
    expose:
      - port: 80
        as: 80
        to:
          - global: true
      - port: 9000
        as: 9000
        to:
          - global: true
      - port: 8081
        as: 8081
        to:
          - global: true
      - port: ${SSH_PORT}
        as: ${SSH_PORT}
        to:
          - global: true
    env:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
      - MINIO_BUCKET=${IPFS_BUCKET}
      - MINIO_CONSOLE_PORT=9001
      - IPFS_GATEWAY_PORT=8081
      - IPFS_PROFILE=server
      - AUTOPIN_INTERVAL=10
      - AUTOPIN_PATTERNS=*.html,*.css,*.js,*.json,*.ico,*.png,*.svg,*.wasm,index.html
      - PUID=1000
      - PGID=1000
      - NGINX_ENABLED=false
profiles:
  compute:
    ${IPFS_SVC}:
      resources:
        cpu:
          units: 0.5
        memory:
          size: 512Mi
        storage:
          - size: 1Gi
  placement:
    dcloud:
      pricing:
        ${IPFS_SVC}:
          denom: uact
          amount: 100
deployment:
  ${IPFS_SVC}:
    dcloud:
      profile: ${IPFS_SVC}
      count: 1
