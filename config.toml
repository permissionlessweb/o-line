# O-Line Configuration
#
# Every field maps to an env var: OLINE_{SECTION}_{KEY} (SCREAMING_SNAKE_CASE).
# Env vars override values here. Resolution: env var > .env file > this file.
#
# Subdomains are derived automatically from node domains:
#   domain = "terp.network"  →  rpc.terp.network, api.terp.network, etc.

# ── Chain ─────────────────────────────────────────────────────────────────
[chain]
id              = "morocco-1"
binary          = "terpd"
genesis_url     = "https://raw.githubusercontent.com/terpnetwork/networks/main/mainnet/morocco-1/genesis.json"
chain_json      = ""
addrbook_url    = ""
sync_method     = "snapshot"
snapshot_url    = ""
entrypoint_url  = "https://raw.githubusercontent.com/permissionlessweb/o-line/refs/heads/feat/oline-staging/plays/audible/oline-entrypoint.sh"
faucet_domain   = ""

peers = [
  "a43c1415bc3a58b0881d2c5c2abe857b45f0a7e7@135.181.60.157:26716",
  "58e01ab84eb931a82a024324520021d2e075ec67@185.248.24.16:29656",
]
private_peers = []

# ── Images ────────────────────────────────────────────────────────────────
[images]
node    = "ghcr.io/terpnetwork/terp-core:v5.1.6-oline"
minio   = "minio/minio:latest"
relayer = "ghcr.io/permissionlessweb/rly-docker:latest"
argus   = "ghcr.io/permissionlessweb/argus:latest"

# ── Akash ─────────────────────────────────────────────────────────────────
[akash]
rpc  = "https://akash-rpc.polkachu.com"
grpc = "https://akash.lavenderfive.com:443"
rest = "https://api.akashnet.net:443"

# ── DNS ───────────────────────────────────────────────────────────────────
[dns]
cf_token = ""   # secret — set via OLINE_DNS_CF_TOKEN env var
cf_zone  = ""

# ── SSH ───────────────────────────────────────────────────────────────────
[ssh]
port   = 22
pubkey = ""

# ── Snapshot Export ───────────────────────────────────────────────────────
[snapshot]
domain    = ""
path      = "snapshots/terpnetwork"
schedule  = "00:00:00"
format    = "tar.gz"
retain    = "2 days"
keep_last = 2

# ── Nodes ─────────────────────────────────────────────────────────────────
# Set domain to enable a node. Subdomains auto-derived:
#   rpc.{domain}  api.{domain}  grpc.{domain}  peer.{domain}
# Ports default to standard cosmos ports. Override with [nodes.X.ports].

[nodes.snapshot]
domain = ""

[nodes.seed]
domain = ""

[nodes.left_tackle]
domain = ""

[nodes.right_tackle]
domain = ""

[nodes.left_forward]
domain = ""

[nodes.right_forward]
domain = ""

# ── Relayer ───────────────────────────────────────────────────────────────
[relayer]
enabled      = false
key_name     = "relayer_key"
remote_chain = ""
domain       = ""
entrypoint   = ""

# ── Sites ─────────────────────────────────────────────────────────────────
[sites]
gateway_domain = ""
s3_domain      = ""
console_domain = ""

# ── MinIO ─────────────────────────────────────────────────────────────────
[minio]
autopin_interval = 300
