services:
  minio-ipfs:
    build: .
    image: minio-ipfs:latest
    container_name: minio-ipfs-e2e
    restart: unless-stopped
    environment:
      # MinIO
      - MINIO_ENABLED=${MINIO_ENABLED:-true}
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minioadmin}
      - MINIO_P=${MINIO_P:-9000}
      - MINIO_CONSOLE_P=${MINIO_CONSOLE_P:-9002}
      - IPFS_GATEWAY_P=${IPFS_GATEWAY_P:-8081}
      - IPFS_PROFILE=${IPFS_PROFILE:-server}
      # Auto-pin (NEW multi-bucket support)
      - AUTOPIN_BUCKETS=${AUTOPIN_BUCKETS:-snapshots,static} 
      - AUTOPIN_INTERVAL=${AUTOPIN_INTERVAL:-30}
      - AUTOPIN_PATTERNS=${AUTOPIN_PATTERNS:-*}
      # User
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}

    ports:
      - "9002:9002"    # MinIO Console
      - "5001:5001"    # IPFS Console
      - "8081:8081"    # IPFS Gateway
      - "9000:9000"    # MinIO S3 API

    volumes:
          - minio_ipfs:/data
volumes:
  minio_ipfs: