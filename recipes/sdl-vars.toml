[phase_f]
template = "f.yml"
services = ["oline-f-argus"]
depends_on = []

input_vars = [
  ["ARGUS_API_D",  "config", false, ""],
  ["ARGUS_API_P",  "config", false, "3000"],
]
# Statesync params and accept list auto-computed
