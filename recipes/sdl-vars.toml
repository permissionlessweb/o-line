# oline SDL variable schema — compact array format for LLM consumption
#
# Each phase section lists ALL template variables with:
#   [name, source, required, default]
#
# source:
#   "config"   — read from .env / OLineConfig (user must have set this)
#   "auto"     — oline generates this at deploy time (LLM does NOT output it)
#   "runtime"  — injected from a previous phase's outputs (peer ids, endpoints)
#   "input"    — LLM must provide this value when calling populate-sdl
#
# When calling `oline sdl populate --phase <X> --vars '[...]'`:
# Only pass vars with source="input" or config overrides.
# Skip source="auto" and source="runtime" — oline handles those.
#
# Compact array format:  [["KEY","value"],["KEY2","value2"]]

# ── Shared / chain-level vars (all phases inherit these from config) ────────────

[chain]
# These come from .env / oline init — never repeat in per-phase arrays
vars = [
  # name,                  source,   required, default
  ["OMNIBUS_IMAGE",        "config", true,     "ghcr.io/akash-network/cosmos-omnibus:v1.2.38-generic"],
  ["OLINE_BINARY",         "config", true,     "terpd"],
  ["OLINE_CHAIN_ID",       "config", true,     "morocco-1"],
  ["OLINE_CHAIN_JSON",     "config", false,    ""],
  ["OLINE_ADDRBOOK_URL",   "config", false,    "https://anode.team/Terp/main/addrbook.json"],
  ["OLINE_ENTRYPOINT_URL", "config", true,     "https://raw.githubusercontent.com/permissionlessweb/o-line/refs/heads/feat/mvp/plays/audible/oline-entrypoint.sh"],
  ["OLINE_PERSISTENT_PEERS","config",false,    "5bf887027701d3b8c4d95c0ba898cc8bf6d166ff@188.165.194.110:26676,..."],
  ["OLINE_VALIDATOR_PEER_ID","config",true,    ""],
  ["OLINE_SYNC_METHOD",    "config", false,    "statesync"],  # "statesync" | "snapshot"
  ["SSH_P",                "config", false,    "22"],
]

[statesync]
# Set when OLINE_SYNC_METHOD=statesync
vars = [
  ["STATESYNC_RPC_SERVERS",  "config", true,  "=https://terp.rpc.m.anode.team:443,..."],
  ["STATESYNC_TRUST_HEIGHT", "auto",   false, ""],  # oline fetches live from RPC
  ["STATESYNC_TRUST_HASH",   "auto",   false, ""],  # oline fetches live from RPC
  ["STATESYNC_TRUST_PERIOD", "config", false, "168h"],
]

[snapshot_storage]
# Set when OLINE_SYNC_METHOD=snapshot (or snapshot node always)
vars = [
  ["OLINE_SNAP_PATH",            "config", true,  "snapshots/terpnetwork"],
  ["OLINE_SNAP_TIME",            "config", false, "00:00:00"],
  ["OLINE_SNAP_FULL_URL",        "config", false, ""],
  ["OLINE_SNAP_SAVE_FORMAT",     "config", false, "tar.gz"],
  ["OLINE_SNAP_RETAIN",          "config", false, "2 days"],
  ["OLINE_SNAP_KEEP_LAST",       "config", false, "2"],
  ["OLINE_SNAP_DOWNLOAD_DOMAIN", "config", false, ""],
]

# ── Phase A: Special Teams (snapshot + seed + minio) ───────────────────────────
# Template: templates/sdls/oline/a.yml
# Services: oline-a-snapshot, oline-a-seed, oline-a-minio-ipfs

[phase_a]
template = "a.yml"
services = ["oline-a-snapshot", "oline-a-seed", "oline-a-minio-ipfs"]

[[phase_a.vars]]
# Service names — always auto, never pass these
name = "SNAPSHOT_SVC";    source = "auto";    default = "oline-a-snapshot"
name = "SEED_SVC";        source = "auto";    default = "oline-a-seed"
name = "MINIO_SVC";       source = "auto";    default = "oline-a-minio-ipfs"

# SSH + S3 credentials — auto-generated by oline, shared across A services
# ["SSH_PUBKEY",          "auto:keygen",   ...]
# ["SSH_PRIVKEY",         "auto:keygen",   ...]
# ["SSH_KEY_PATH",        "auto",          ...]
# ["S3_KEY",              "auto:cred",     ...]
# ["S3_SECRET",           "auto:cred",     ...]
# ["MINIO_ROOT_USER",     "auto:=S3_KEY",  ...]
# ["MINIO_ROOT_PASSWORD", "auto:=S3_SECRET"...]
# ["S3_HOST",             "auto",          "oline-a-minio-ipfs:9000 --no-ssl"]

# Computed from config
# ["SNAPSHOT_METADATA_URL", "auto",        "https://{OLINE_SNAP_DOWNLOAD_DOMAIN}/{OLINE_SNAP_PATH}"]
# ["MINIO_BUCKET",          "auto",        "first segment of OLINE_SNAP_PATH"]

# Domains + ports (from config SPECIAL_TEAMS_FD)
input_vars = [
  # name,          source,   required, default
  ["RPC_D_SNAP",   "config", false,    "statesync.terp.network"],
  ["RPC_P_SNAP",   "config", false,    "26657"],
  ["API_D_SNAP",   "config", false,    ""],
  ["API_P_SNAP",   "config", false,    "1317"],
  ["P2P_D_SNAP",   "config", false,    "statesync-peer.terp.network"],
  ["P2P_P_SNAP",   "config", false,    "26656"],
  ["GRPC_D_SNAP",  "config", false,    ""],
  ["GRPC_P_SNAP",  "config", false,    "9090"],
  ["RPC_D_SEED",   "config", false,    "seed.terp.network"],
  ["RPC_P_SEED",   "config", false,    "26657"],
  ["API_D_SEED",   "config", false,    ""],
  ["API_P_SEED",   "config", false,    "1317"],
  ["P2P_D_SEED",   "config", false,    "seed-peer.terp.network"],
  ["P2P_P_SEED",   "config", false,    "26656"],
  ["GRPC_D_SEED",  "config", false,    ""],
  ["GRPC_P_SEED",  "config", false,    "9090"],
  ["MINIO_IPFS_IMAGE", "config", false, "ghcr.io/permissionlessweb/minio-ipfs:latest"],
  ["OLINE_AUTOPIN_INTERVAL", "config", false, "300"],
]
# Accept lists auto-computed: SNAPSHOT_80_ACCEPTS, SEED_80_ACCEPTS, MINIO_80_ACCEPTS

# ── Phase B: Tackles (left + right private sentries) ───────────────────────────
# Template: templates/sdls/oline/b.yml
# Services: oline-b-left-tackle, oline-b-right-tackle
# Depends on: phase_a outputs (snapshot peer id, statesync trust params)

[phase_b]
template = "b.yml"
services = ["oline-b-left-tackle", "oline-b-right-tackle"]
depends_on = ["phase_a"]  # needs SNAPSHOT_PEER_ID from phase_a session state

[[phase_b.vars]]
# Service names — auto
# ["LT_SVC", "auto", "oline-b-left-tackle"]
# ["RT_SVC", "auto", "oline-b-right-tackle"]
# ["SEED_SVC", "auto", "oline-a-seed"]  # reference for snapshot URL

# SSH keypair — auto:keygen (fresh per phase)
# Monikers — auto:random (LEFT_TACKLE_MONIKER, RIGHT_TACKLE_MONIKER)

# Runtime inputs injected from phase_a
# ["TERPD_P2P_PERSISTENT_PEERS",     "runtime", ← snapshot_peer from phase_a]
# ["TERPD_P2P_PRIVATE_PEER_IDS",     "runtime", ← config:OLINE_VALIDATOR_PEER_ID]
# ["TERPD_P2P_UNCONDITIONAL_PEER_IDS","runtime", ← config:OLINE_VALIDATOR_PEER_ID]
# Statesync params — auto:fetched if OLINE_SYNC_METHOD=statesync

input_vars = [
  ["RPC_D_TL",   "config", false, ""],
  ["RPC_P_TL",   "config", false, "26657"],
  ["API_D_TL",   "config", false, ""],
  ["API_P_TL",   "config", false, "1317"],
  ["P2P_D_TL",   "config", false, ""],
  ["P2P_P_TL",   "config", false, "26656"],
  ["GRPC_D_TL",  "config", false, ""],
  ["GRPC_P_TL",  "config", false, "9090"],
  ["RPC_D_TR",   "config", false, ""],
  ["RPC_P_TR",   "config", false, "26657"],
  ["API_D_TR",   "config", false, ""],
  ["API_P_TR",   "config", false, "1317"],
  ["P2P_D_TR",   "config", false, ""],
  ["P2P_P_TR",   "config", false, "26656"],
  ["GRPC_D_TR",  "config", false, ""],
  ["GRPC_P_TR",  "config", false, "9090"],
]
# Accept lists auto-computed: LT_80_ACCEPTS, RT_80_ACCEPTS

# ── Phase C: Forwards (left + right public RPC/API) ────────────────────────────
# Template: templates/sdls/oline/c.yml
# Services: oline-c-left-forward, oline-c-right-forward
# Depends on: phase_a (seed peer), phase_b (tackle peer ids)

[phase_c]
template = "c.yml"
services = ["oline-c-left-forward", "oline-c-right-forward"]
depends_on = ["phase_a", "phase_b"]

# Runtime inputs from phase_a + phase_b:
# ["TERPD_P2P_SEEDS",                "runtime", ← seed_peer]
# ["TERPD_P2P_PERSISTENT_PEERS",     "runtime", ← snapshot_peer]
# ["TERPD_P2P_PRIVATE_PEER_IDS",     "runtime", ← lt_peer,rt_peer]
# ["TERPD_P2P_UNCONDITIONAL_PEER_IDS","runtime", ← lt_peer,rt_peer]

input_vars = [
  ["RPC_D_FL",  "config", false, "rpc.terp.network"],
  ["RPC_P_FL",  "config", false, "26657"],
  ["API_D_FL",  "config", false, "api.terp.network"],
  ["API_P_FL",  "config", false, "1317"],
  ["P2P_D_FL",  "config", false, ""],
  ["P2P_P_FL",  "config", false, "26656"],
  ["GRPC_D_FL", "config", false, "grpc.terp.network"],
  ["GRPC_P_FL", "config", false, "9090"],
  ["RPC_D_FR",  "config", false, "rpc2.terp.network"],
  ["RPC_P_FR",  "config", false, "26657"],
  ["API_D_FR",  "config", false, "api2.terp.network"],
  ["API_P_FR",  "config", false, "1317"],
  ["P2P_D_FR",  "config", false, ""],
  ["P2P_P_FR",  "config", false, "26656"],
  ["GRPC_D_FR", "config", false, ""],
  ["GRPC_P_FR", "config", false, "9090"],
]

# ── Phase E: Relayer (IBC) ─────────────────────────────────────────────────────
# Template: templates/sdls/oline/e.yml
# Services: oline-e-relayer

[phase_e]
template = "e.yml"
services = ["oline-e-relayer"]
depends_on = []  # independent, can deploy anytime after chain is live

input_vars = [
  ["RLY_IMAGE",          "config", true,  "ghcr.io/permissionlessweb/rly-docker:latest"],
  ["RLY_KEY_NAME",       "config", true,  "default"],
  ["RLY_REMOTE_CHAIN_ID","config", true,  ""],
  ["RLY_KEY_TERP",       "config", true,  ""],   # secret mnemonic
  ["RLY_KEY_REMOTE",     "config", true,  ""],   # secret mnemonic
  ["RELAYER_ENTRYPOINT", "config", false, ""],
  ["RLY_API_D",          "config", false, ""],
]
# Accept list auto-computed: RLY_80_ACCEPTS

# ── Phase F: Indexer (Argus) ───────────────────────────────────────────────────
