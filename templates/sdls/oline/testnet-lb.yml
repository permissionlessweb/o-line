---
version: "2.0"
services:
  ${LB_SVC}:
    image: nginx:alpine
    command:
      - sh
    args:
      - -c
      - |
        rm -f /etc/nginx/conf.d/default.conf;
        printf "upstream rpc_pool {\n" > /etc/nginx/conf.d/upstreams.conf;
        echo "$UPSTREAM_RPC" | tr "," "\n" | while read s; do [ -n "$s" ] && printf "  server %s max_fails=1 fail_timeout=10s;\n" "$s" >> /etc/nginx/conf.d/upstreams.conf; done;
        printf "}\nupstream api_pool {\n" >> /etc/nginx/conf.d/upstreams.conf;
        echo "$UPSTREAM_API" | tr "," "\n" | while read s; do [ -n "$s" ] && printf "  server %s max_fails=1 fail_timeout=10s;\n" "$s" >> /etc/nginx/conf.d/upstreams.conf; done;
        printf "}\n" >> /etc/nginx/conf.d/upstreams.conf;
        if [ -n "$RPC_DOMAIN" ]; then printf "server {\n  listen 80;\n  server_name %s;\n  location /websocket { proxy_pass http://rpc_pool/websocket; proxy_http_version 1.1; proxy_set_header Upgrade \$http_upgrade; proxy_set_header Connection upgrade; proxy_set_header Host \$host; }\n  location = /net_info { return 403; }\n  location / { proxy_pass http://rpc_pool; proxy_http_version 1.1; proxy_set_header Host \$host; proxy_set_header Upgrade \$http_upgrade; proxy_set_header Connection upgrade; add_header Access-Control-Allow-Origin *; proxy_next_upstream error timeout http_502 http_503; }\n}\n" "$RPC_DOMAIN" > /etc/nginx/conf.d/rpc.conf; fi;
        if [ -n "$API_DOMAIN" ]; then printf "server {\n  listen 80;\n  server_name %s;\n  location / { proxy_pass http://api_pool; proxy_set_header Host \$host; add_header Access-Control-Allow-Origin *; proxy_next_upstream error timeout http_502 http_503; }\n}\n" "$API_DOMAIN" > /etc/nginx/conf.d/api.conf; fi;
        echo "[lb] starting nginx RPC=$RPC_DOMAIN API=$API_DOMAIN";
        nginx -t && exec nginx -g "daemon off;"
    expose:
      - port: 80
        as: 80
        to:
          - global: true
        accept:
${LB_80_ACCEPTS}
      - port: ${SSH_P}
        as: ${SSH_P}
        to:
          - global: true
    env:
      - SSH_PUBKEY=${SSH_PUBKEY}
      - RPC_DOMAIN=${RPC_D_LB}
      - API_DOMAIN=${API_D_LB}
      - GRPC_DOMAIN=${GRPC_D_LB}
      - UPSTREAM_RPC=${SENTRY_A_SVC}:26657,${SENTRY_B_SVC}:26657
      - UPSTREAM_API=${SENTRY_A_SVC}:1317,${SENTRY_B_SVC}:1317
      - UPSTREAM_GRPC=${SENTRY_A_SVC}:9090,${SENTRY_B_SVC}:9090
  ${SENTRY_A_SVC}:
    image: ${TESTNET_SENTRY_IMAGE}
    command:
      - sh
    args:
      - -c
      - curl -fsSL ${OLINE_ENTRYPOINT_URL} -o /tmp/wrapper.sh; bash /tmp/wrapper.sh
    expose:
      - port: 26656
        as: 26656
        to:
          - global: true
          - service: ${LB_SVC}
          - service: ${SENTRY_B_SVC}
      - port: 26657
        as: 26657
        to:
          - service: ${LB_SVC}
      - port: 1317
        as: 1317
        to:
          - service: ${LB_SVC}
      - port: 9090
        as: 9090
        to:
          - service: ${LB_SVC}
      - port: ${SSH_P}
        as: ${SSH_P}
        to:
          - global: true
    env:
      - MONIKER=${SENTRY_A_MONIKER}
      - PROJECT_BIN=${OLINE_BINARY}
      - CHAIN_ID=${TESTNET_CHAIN_ID}
      - GENESIS_URL=${GENESIS_URL}
      - MINIMUM_GAS_PRICES=0.05uthiol
      - FASTSYNC_VERSION=v0
      - PRUNING=nothing
      - STATESYNC_SNAP_INTERVAL=500
      - SNAPSHOT_RETAIN=0
      - TERPD_P2P_PEX=true
      - TERPD_FAUCET_ENABLE=true
      - FAUCET_KEY_MNEMONIC=${SENTRY_A_FAUCET_MNEMONIC}
      - SSH_PUBKEY=${SSH_PUBKEY}
  ${SENTRY_B_SVC}:
    image: ${TESTNET_SENTRY_IMAGE}
    command:
      - sh
    args:
      - -c
      - curl -fsSL ${OLINE_ENTRYPOINT_URL} -o /tmp/wrapper.sh; bash /tmp/wrapper.sh
    expose:
      - port: 26656
        as: 26656
        to:
          - global: true
          - service: ${LB_SVC}
          - service: ${SENTRY_A_SVC}
      - port: 26657
        as: 26657
        to:
          - service: ${LB_SVC}
      - port: 1317
        as: 1317
        to:
          - service: ${LB_SVC}
      - port: 9090
        as: 9090
        to:
          - service: ${LB_SVC}
      - port: ${SSH_P}
        as: ${SSH_P}
        to:
          - global: true
    env:
      - MONIKER=${SENTRY_B_MONIKER}
      - PROJECT_BIN=${OLINE_BINARY}
      - CHAIN_ID=${TESTNET_CHAIN_ID}
      - GENESIS_URL=${GENESIS_URL}
      - MINIMUM_GAS_PRICES=0.05uthiol
      - FASTSYNC_VERSION=v0
      - PRUNING=default
      - SNAPSHOT_RETAIN=0
      - TERPD_P2P_PEX=true
      - TERPD_FAUCET_ENABLE=true
      - FAUCET_KEY_MNEMONIC=${SENTRY_B_FAUCET_MNEMONIC}
      - SSH_PUBKEY=${SSH_PUBKEY}
profiles:
  compute:
    ${LB_SVC}:
      resources:
        cpu:
          units: 0.5
        memory:
          size: 512Mi
        storage:
          - size: 1Gi
    ${SENTRY_A_SVC}:
      resources:
        cpu:
          units: 2
        memory:
          size: 8Gi
        storage:
          - size: 20Gi
    ${SENTRY_B_SVC}:
      resources:
        cpu:
          units: 2
        memory:
          size: 8Gi
        storage:
          - size: 20Gi
  placement:
    dcloud:
      pricing:
        ${LB_SVC}:
          denom: uact
          amount: 500
        ${SENTRY_A_SVC}:
          denom: uact
          amount: 1000
        ${SENTRY_B_SVC}:
          denom: uact
          amount: 1000
      signedBy:
        anyOf:
          - akash1365yvmc4s7awdyj3n2sav7xfx76adc6dnmlx63
      attributes:
        host: akash
deployment:
  ${LB_SVC}:
    dcloud:
      profile: ${LB_SVC}
      count: 1
  ${SENTRY_A_SVC}:
    dcloud:
      profile: ${SENTRY_A_SVC}
      count: 1
  ${SENTRY_B_SVC}:
    dcloud:
      profile: ${SENTRY_B_SVC}
      count: 1
