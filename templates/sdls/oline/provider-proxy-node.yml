---
# ── Provider Proxy + Akash Light Node ────────────────────────────────────────
# Unified specialty deployment: Console provider proxy (mTLS) + lightweight
# Akash full node for RPC/REST/gRPC. Deployed on Akash Network.
#
# Services:
#   proxy-node — Runs both the provider proxy (Hono/TypeScript) and an Akash
#                node under supervisord. The proxy validates provider mTLS certs
#                against the co-located node's REST API.
#
# Ports:
#   3000 (→443) — Provider proxy API (HTTPS via Akash ingress)
#   26657       — Akash node RPC
#   1317        — Akash node REST API
#   9090        — Akash node gRPC
#
# Protection:
#   This is a specialty infrastructure deployment (like the Headscale VPN).
#   It is protected from accidental `oline manage close` unless --include-protected.
# ─────────────────────────────────────────────────────────────────────────────
version: "2.0"
services:
    ${PROXY_SVC}:
        image: ${PROXY_NODE_IMAGE}
        command:
            - sh
        args:
            - -c
            - |
                set -e

                echo "=== Starting Akash node (pruned mode) ==="
                /usr/bin/akash start \
                  --home /root/.akash \
                  --pruning custom \
                  --pruning-keep-recent 100 \
                  --pruning-interval 10 \
                  --minimum-gas-prices 0.025uakt \
                  --p2p.seeds "${AKASH_SEEDS}" \
                  --moniker "oline-proxy-node" \
                  --chain-id "${AKASH_CHAIN_ID}" \
                  --api.enable true \
                  --api.address "tcp://0.0.0.0:1317" \
                  --rpc.laddr "tcp://0.0.0.0:26657" \
                  --grpc.address "0.0.0.0:9090" &
                NODE_PID=$!

                echo "=== Waiting for node RPC to be ready ==="
                for i in $(seq 1 60); do
                  if wget -q -O /dev/null http://127.0.0.1:26657/status 2>/dev/null; then
                    echo "=== Node RPC is ready ==="
                    break
                  fi
                  sleep 2
                done

                echo "=== Starting provider proxy on :3000 ==="
                cd /app/provider-proxy
                REST_API_NODE_URL=http://localhost:1317 \
                PORT=3000 \
                node dist/index.js &
                PROXY_PID=$!

                echo "=== Both services running ==="
                wait $NODE_PID $PROXY_PID
        expose:
            # Provider proxy — Akash ingress terminates TLS, routes to 3000
            - port: 3000
              as: 443
              to:
                  - global: true
              accept:
                  - ${PROXY_DOMAIN}
            # Akash node RPC
            - port: 26657
              as: 26657
              to:
                  - global: true
            # Akash node REST API
            - port: 1317
              as: 1317
              to:
                  - global: true
            # Akash node gRPC
            - port: 9090
              as: 9090
              to:
                  - global: true
        env:
            - AKASH_CHAIN_ID=${AKASH_CHAIN_ID}
            - AKASH_SEEDS=${AKASH_SEEDS}
            - REST_API_NODE_URL=http://localhost:1317
            - PORT=3000
        params:
            storage:
                proxy-node-data:
                    mount: /root/.akash
                    readOnly: false
profiles:
    compute:
        ${PROXY_SVC}:
            resources:
                cpu:
                    units: 2
                memory:
                    size: 4Gi
                storage:
                    - size: 2Gi
                    - name: proxy-node-data
                      size: 50Gi
                      attributes:
                          persistent: true
                          class: beta3
    placement:
        dcloud:
            pricing:
                ${PROXY_SVC}:
                    denom: uact
                    amount: 1000
            signedBy:
                anyOf:
                    - akash1365yvmc4s7awdyj3n2sav7xfx76adc6dnmlx63
            attributes:
                host: akash
deployment:
    ${PROXY_SVC}:
        dcloud:
            profile: ${PROXY_SVC}
            count: 1
