---
version: "2.0"
services:
  ${SNAPSHOT_SVC}:
    image: ${OMNIBUS_IMAGE}
    command:
      - sh
    args:
      - -c
      - curl -fsSL ${OLINE_ENTRYPOINT_URL} -o /tmp/wrapper.sh; bash /tmp/wrapper.sh
    expose:
      - port: ${P2P_P_SNAP}
        as: ${P2P_P_SNAP}
        to:
          - global: true
      - port: ${RPC_P_SNAP}
        as: ${RPC_P_SNAP}
        to:
          - global: true
      - port: 9091
        as: ${GRPC_P_SNAP}
        to:
          - global: true
      - port: 80
        as: 80
        to:
          - global: true
        accept:
${SNAPSHOT_80_ACCEPTS}
      - port: ${SSH_P}
        as: ${SSH_P}
        to:
          - global: true
    env:
      - MONIKER=${SNAPSHOT_MONIKER}
      - PROJECT_BIN=${OLINE_BINARY}
      - CHAIN_ID=${TESTNET_CHAIN_ID}
      - GENESIS_URL=${GENESIS_URL}
      - MINIMUM_GAS_PRICES=0.05uthiol
      - FASTSYNC_VERSION=v0
      - PRUNING=nothing
      - STATESYNC_SNAP_INTERVAL=500
      - TERPD_P2P_PEX=false
      - TERPD_P2P_PERSISTENT_PEERS=${TERPD_P2P_PERSISTENT_PEERS}
      - TERPD_P2P_UNCONDITIONAL_PEER_IDS=${TERPD_P2P_UNCONDITIONAL_PEER_IDS}
      - TERPD_P2P_PRIVATE_PEER_IDS=${TERPD_P2P_PRIVATE_PEER_IDS}
      - RPC_DOMAIN=${RPC_D_SNAP}
      - RPC_P=${RPC_P_SNAP}
      - API_D=${API_D_SNAP}
      - API_P=${API_P_SNAP}
      - P2P_D=${P2P_D_SNAP}
      - P2P_P=${P2P_P_SNAP}
      - GRPC_P=${GRPC_P_SNAP}
      - GRPC_D=${GRPC_D_SNAP}
      - SSH_PUBKEY=${SSH_PUBKEY}
      - HEADSCALE_URL=${HEADSCALE_URL}
      - HEADSCALE_PREAUTH_KEY=${HEADSCALE_PREAUTH_KEY}
  ${SEED_SVC}:
    image: ${OMNIBUS_IMAGE}
    command:
      - sh
    args:
      - -c
      - curl -fsSL ${OLINE_ENTRYPOINT_URL} -o /tmp/wrapper.sh; bash /tmp/wrapper.sh
    expose:
      - port: 26657
        as: 26657
        to:
          - global: true
      - port: 26656
        as: 26656
        to:
          - global: true
      - port: 9091
        as: ${GRPC_P_SEED}
        to:
          - global: true
      - port: 80
        as: 80
        to:
          - global: true
        accept:
${SEED_80_ACCEPTS}
      - port: ${SSH_P}
        as: ${SSH_P}
        to:
          - global: true
    env:
      - SSH_PUBKEY=${SSH_PUBKEY}
      - HEADSCALE_URL=${HEADSCALE_URL}
      - HEADSCALE_PREAUTH_KEY=${HEADSCALE_PREAUTH_KEY}
      - MONIKER=${SEED_MONIKER}
      - PROJECT_BIN=${OLINE_BINARY}
      - CHAIN_ID=${TESTNET_CHAIN_ID}
      - GENESIS_URL=${GENESIS_URL}
      - MINIMUM_GAS_PRICES=0.05uthiol
      - PRUNING=default
      - TERPD_P2P_PEX=true
      - FASTSYNC_VERSION=v0
      - STATESYNC_SNAP_INTERVAL=500
      - TERPD_P2P_PERSISTENT_PEERS=${TERPD_P2P_PERSISTENT_PEERS}
      - TERPD_P2P_UNCONDITIONAL_PEER_IDS=${TERPD_P2P_UNCONDITIONAL_PEER_IDS}
      - TERPD_P2P_PRIVATE_PEER_IDS=${TERPD_P2P_PRIVATE_PEER_IDS}
      - RPC_DOMAIN=${RPC_D_SEED}
      - RPC_P=${RPC_P_SEED}
      - API_D=${API_D_SEED}
      - API_P=${API_P_SEED}
      - P2P_D=${P2P_D_SEED}
      - P2P_P=${P2P_P_SEED}
      - GRPC_P=${GRPC_P_SEED}
      - GRPC_D=${GRPC_D_SEED}
profiles:
  compute:
    ${SNAPSHOT_SVC}:
      resources:
        cpu:
          units: 2
        memory:
          size: 8Gi
        storage:
          - size: 20Gi
    ${SEED_SVC}:
      resources:
        cpu:
          units: 2
        memory:
          size: 8Gi
        storage:
          - size: 20Gi
  placement:
    dcloud:
      pricing:
        ${SNAPSHOT_SVC}:
          denom: uact
          amount: 1000
        ${SEED_SVC}:
          denom: uact
          amount: 1000
      signedBy:
        anyOf:
          - akash1365yvmc4s7awdyj3n2sav7xfx76adc6dnmlx63
      attributes:
        host: akash
deployment:
  ${SNAPSHOT_SVC}:
    dcloud:
      profile: ${SNAPSHOT_SVC}
      count: 1
  ${SEED_SVC}:
    dcloud:
      profile: ${SEED_SVC}
      count: 1
