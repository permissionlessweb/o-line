---
version: "2.0"

services:
  web:
    # Use specific nginx:alpine version tag (never use :latest)
    image: terpnetwork/terp-website:v2.0.0
    expose:
      - port: 80
        as: 80
        to:
          - global: true
        accept:
          - terp.network
          - www.terp.network

profiles:
  compute:
    web:
      resources:
        cpu:
          units: 0.5
        memory:
          size: 512Mi
        storage:
          size: 1Gi

  placement:
    akash:
      pricing:
        web:
          denom: uact
          amount: 1000
deployment:
  web:
    akash:
      profile: web
      count: 1
